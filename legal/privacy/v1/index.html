<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Privacy Policy / Datenschutzerklärung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var supported = ['de', 'en'];
      var fallback  = 'en';
      var forced = new URLSearchParams(location.search).get('lang');
      var browser = (navigator.language || fallback).slice(0, 2).toLowerCase();
      var lang = supported.indexOf(forced) >= 0 ? forced
               : supported.indexOf(browser) >= 0 ? browser
               : fallback;
      location.replace(lang + '.html' + location.hash);
    })();
  </script>
</head>
<body>
  <noscript>
    <h1>Privacy Policy / Datenschutzerklärung</h1>
    <ul>
      <li><a href="de.html">Deutsch</a></li>
      <li><a href="en.html">English</a></li>
    </ul>
  </noscript>
</body>
</html>
